name: CI

on:
  push:
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.0', '8.2']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: PHP syntax check
        run: |
          find plugins/TypechoPay themes/VOID \
            -path '*/vendor/*' -prune -o \
            -path '*/node_modules/*' -prune -o \
            -name '*.php' -print0 \
            | xargs -0 -n1 php -l

      - name: TypechoPay tests
        run: |
          for test in plugins/TypechoPay/tests/*Test.php; do
            php "$test"
          done

      - name: VOID theme tests
        run: |
          for test in themes/VOID/tests/*Test.php; do
            php "$test"
          done

      - name: Build release packages
        run: |
          VERSION=ci sh scripts/package-release.sh
          test -f dist/TypechoPay-ci.zip
          test -f dist/VOID-cloudmantou-ci.zip
          unzip -l dist/TypechoPay-ci.zip | grep 'TypechoPay/Plugin.php'
          unzip -l dist/VOID-cloudmantou-ci.zip | grep 'VOID/functions.php'
